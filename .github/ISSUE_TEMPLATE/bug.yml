name: Bug Report
description: Report an error, crash, or incorrect behavior
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Please include as much detail as possible so the bug can be reproduced.
  - type: input
    id: summary
    attributes:
      label: Bug Summary
      placeholder: "Resnet50's training diverges on imagewoof"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Run uv run train_model.py --model ResNet50 --dataset_name imagewoof2
        2. Check the loss
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: "Training should converge and be at least as good as the smaller versions"
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: "The accuracy remains around 10% (As good as guessing)"
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Minor (small glitch)
        - Major (breaks core functionality)
        - Critical (crash or data loss)
